<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RR Lanches - FINAL</title>
</head>
<body>
<!-- Arquivo focado apenas na correção do WhatsApp padrão melhorado -->

<script>

function gerarNumero(){
    const d=new Date();
    return "RR"+
    String(d.getDate()).padStart(2,'0')+
    String(d.getMonth()+1).padStart(2,'0')+
    String(d.getFullYear()).slice(2)+"-"+
    String(d.getHours()).padStart(2,'0')+
    String(d.getMinutes()).padStart(2,'0');
}

function montarMensagem(produtos,qtds,loja,extra){

    const d=new Date();
    const dias=["Domingo","Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];

    let totalItens = 0;

    let msg = "";
    msg += `*Pedido* Nº: ${gerarNumero()}\n`;
    msg += `*Data* ${d.toLocaleDateString()} (${dias[d.getDay()]})\n`;
    msg += `Hora: ${d.toTimeString().slice(0,5)}\n\n`;

    msg += `Loja: ${loja}\n\n`;

    msg += `*Itens*\n`;

    produtos.forEach(p=>{
        if(qtds[p.codigo]>0){
            totalItens++;
            msg += `${p.codigo} - ${p.descricao} = ${qtds[p.codigo]} ${p.embalagem}\n`;
        }
    });

    if(extra){
        msg += `\n*OBSERVAÇÕES OU FALTAS*\n`;
        msg += `${extra}\n`;
    }

    msg += `\n---------------\n`;
    msg += `*TOTAL DE ITENS:* ${totalItens}\n\n`;

    msg += `Pedido gerado via App RR Lanches`;

    return msg;
}

</script>

</body>
</html>
