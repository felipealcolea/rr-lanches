<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RR Lanches - MASTER</title>

<style>
body { font-family: Arial; margin:0; background:#f3f4f6; padding-bottom:140px; }

/* LOGO TOPO */
.topo-logo{
    background:white;
    padding:10px;
    text-align:center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.topo-logo img{
    max-width:90%;
    max-height:120px;
    height:auto;
}

/* BLOCO TOPO */
.topo{
    padding:10px;
    background:white;
    position:sticky;
    top:0;
    z-index:10;
}

select,input,textarea{
    width:100%;
    padding:10px;
    margin-bottom:8px;
    border-radius:6px;
    border:1px solid #ccc;
}

.resumo{
    background:#111827;
    color:white;
    padding:8px;
    border-radius:6px;
    font-size:14px;
    text-align:center;
    margin-bottom:8px;
}

.categoria{
    padding:8px 10px;
    font-weight:bold;
    color:#1e3a8a;
}

.item{
    background:white;
    margin:6px 10px;
    padding:10px;
    border-radius:8px;
}

.item.ativo{ background:#d1fae5; }

.linha{
    display:flex;
    justify-content:space-between;
    gap:10px;
}

.desc{ flex:1; font-size:14px; }

.controls{
    display:flex;
    align-items:center;
    gap:5px;
}

.controls button{
    width:38px;
    height:38px;
    border:none;
    color:white;
    font-size:18px;
    border-radius:6px;
}

.btn-plus{ background:#2563eb; }
.btn-minus{ background:#dc2626; }

.qtd{ min-width:20px; text-align:center; }

.botoes{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
}

.botoes button{
    flex:1;
    padding:15px;
    border:none;
    color:white;
    font-size:16px;
}

.enviar{ background:#16a34a; }
.limpar{ background:#374151; }

.eye{ margin-left:5px; cursor:pointer; opacity:.5;}
.eye:hover{opacity:1;}

.logo{
    position:fixed;
    bottom:80px;
    right:10px;
    width:70px;
    opacity:.1;
}
</style>
</head>

<body>

<div class="topo-logo">
    <img src="logo2.png" alt="RR Lanches Parceria FBF">
</div>

<div class="topo">
<select id="loja"></select>
<input id="busca" placeholder="Buscar...">
<textarea id="extra" placeholder="Itens não encontrados"></textarea>

<div class="resumo" id="resumo">Itens: 0</div>
</div>

<div id="produtos"></div>

<div class="botoes">
<button class="limpar" onclick="limpar()">Limpar</button>
<button class="enviar" onclick="confirmar()">Enviar</button>
</div>

<img src="logo.png" class="logo">

<script>

let produtos=[], lojas=[], qtds={};

async function carregar(){
produtos=await fetch("produtos.json").then(r=>r.json());
lojas=await fetch("lojas.json").then(r=>r.json());

let s=document.getElementById("loja");
s.innerHTML="<option value=''>Selecione</option>";
lojas.forEach(l=> s.innerHTML+=`<option>${l.codigo} - ${l.nome}</option>`);

render();
}

function abrir(link){ if(link) window.open(link) }

function render(){
let busca=document.getElementById("busca").value.toLowerCase();
let div=document.getElementById("produtos");
div.innerHTML="";

let cat="", total=0;

produtos.forEach(p=>{
if(!p.descricao.toLowerCase().includes(busca) && !p.codigo.includes(busca)) return;

if(p.categoria!==cat){
cat=p.categoria;
div.innerHTML+=`<div class="categoria">${cat}</div>`;
}

let q=qtds[p.codigo]||0;
if(q>0) total+=q;

let eye=p.link?`<span class="eye" onclick="abrir('${p.link}')">👁</span>`:"";

div.innerHTML+=`
<div class="item ${q>0?'ativo':''}" onclick="mais('${p.codigo}')">
<div class="linha">
<div class="desc">${p.codigo} - ${p.descricao} ${eye}</div>
<div class="controls" onclick="event.stopPropagation()">
<button class="btn-minus" 
onmousedown="holdStart('${p.codigo}')" 
onmouseup="holdEnd()" 
onclick="menos('${p.codigo}')">-</button>
<div class="qtd">${q}</div>
<button class="btn-plus" onclick="mais('${p.codigo}')">+</button>
</div>
</div>
</div>`;
});

document.getElementById("resumo").innerText="Itens: "+Object.keys(qtds).filter(k=>qtds[k]>0).length+" | Volumes: "+total;
}

function mais(c){ qtds[c]=(qtds[c]||0)+1; salvar();}
function menos(c){ if(qtds[c]>0) qtds[c]--; salvar();}

let hold;
function holdStart(c){
hold=setTimeout(()=>{ qtds[c]=0; salvar(); },600);
}
function holdEnd(){ clearTimeout(hold); }

function salvar(){ localStorage.setItem("qtd",JSON.stringify(qtds)); render(); }

function limpar(){ if(confirm("Limpar?")){ qtds={}; localStorage.clear(); render(); } }

function gerarNumero(){
let d=new Date();
return "RR"+d.getDate()+("0"+(d.getMonth()+1)).slice(-2)+d.getFullYear().toString().slice(2)+"-"+d.getHours()+d.getMinutes();
}

function montar(){
let loja=document.getElementById("loja").value;
let extra=document.getElementById("extra").value;
let d=new Date();
let dias=["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];

let msg=`*Pedido* Nº: ${gerarNumero()}\n`;
msg+=`*Data* ${d.toLocaleDateString()} (${dias[d.getDay()]})\n`;
msg+=`Hora: ${d.toTimeString().slice(0,5)}\n\n`;
msg+=`Loja: ${loja}\n\n*Itens*\n`;

let total=0;

produtos.forEach(p=>{
if(qtds[p.codigo]>0){
total++;
msg+=`${p.codigo} - ${p.descricao} = ${qtds[p.codigo]} ${p.embalagem}\n`;
}
});

if(extra) msg+=`\n*ITENS NÃO ENCONTRADOS:*\n${extra}\n`;

msg+=`\n----------------\nTOTAL: ${total}\n\nApp RR`;

return msg;
}

function confirmar(){
if(!document.getElementById("loja").value){ alert("Selecione loja"); return;}
let msg=montar();
if(confirm(msg)) window.open("https://wa.me/5515997094000?text="+encodeURIComponent(msg));
}

document.getElementById("busca").addEventListener("input",render);

carregar();

</script>

</body>
</html>
