<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RR Lanches FINAL</title>

<style>
body{font-family:Arial;margin:0;background:#f3f4f6;padding-bottom:120px;}

.topo-logo{background:#fff;padding:10px;text-align:center;}
.topo-logo img{max-width:90%;max-height:120px;}

.topo{padding:10px;background:#fff;position:sticky;top:0;}
select,input,textarea{width:100%;padding:10px;margin-bottom:8px;border-radius:6px;border:1px solid #ccc;}

.resumo{background:#111827;color:#fff;padding:8px;border-radius:6px;text-align:center;margin-bottom:8px;}

.filtro{display:flex;gap:8px;margin-bottom:10px;}
.filtro button{flex:1;padding:12px;border:none;border-radius:8px;background:#e5e7eb;}
.filtro .ativo{background:#1e3a8a;color:#fff;}

.item{background:#fff;margin:6px 10px;padding:10px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;}
.item.ativo{background:#d1fae5;}

.controls{display:flex;gap:5px;align-items:center;}
.controls button{width:35px;height:35px;border:none;color:#fff;border-radius:6px;}
.btn-plus{background:#2563eb;}
.btn-minus{background:#dc2626;}

.eye{margin-left:6px;font-size:14px;opacity:0.6;cursor:pointer;}
.eye:hover{opacity:1;}

.botoes{position:fixed;bottom:0;width:100%;display:flex;}
.botoes button{flex:1;padding:15px;border:none;color:#fff;}
.enviar{background:#16a34a;}
.limpar{background:#374151;}
</style>
</head>

<body>

<div class="topo-logo">
<img src="logo2.png">
</div>

<div class="topo">
<select id="loja"></select>
<input id="busca" placeholder="Buscar produto...">
<textarea id="extra" placeholder="Observações ou faltas"></textarea>

<div class="resumo" id="resumo">Itens: 0 | Volumes: 0</div>

<div class="filtro">
<button id="btnTodos" class="ativo">Todos</button>
<button id="btnSel">Selecionados</button>
</div>
</div>

<div id="lista"></div>

<div class="botoes">
<button class="limpar" onclick="limpar()">Limpar</button>
<button class="enviar" onclick="enviar()">Enviar</button>
</div>

<script>

let produtos=[], lojas=[], qtd={}, modo="todos";

async function init(){
produtos=await fetch("produtos.json").then(r=>r.json());
lojas=await fetch("lojas.json").then(r=>r.json());

loja.innerHTML="<option value=''>Selecione</option>";
lojas.forEach(l=>loja.innerHTML+=`<option>${l.codigo} - ${l.nome}</option>`);

render();
}

function abrirLink(link){
if(link) window.open(link,"_blank");
}

function render(){
let termo=busca.value.toLowerCase();
lista.innerHTML="";
let totalVol=0;

produtos.forEach(p=>{
let q=qtd[p.codigo]||0;

if(!p.descricao.toLowerCase().includes(termo)&&!p.codigo.includes(termo))return;
if(modo==="sel"&&q===0)return;

if(q>0) totalVol+=q;

lista.innerHTML+=`
<div class="item ${q>0?'ativo':''}">
<span>
${p.codigo} - ${p.descricao}
${p.link ? `<span class="eye" onclick="abrirLink('${p.link}')">👁</span>` : ""}
</span>
<div class="controls">
<button class="btn-minus" onclick="menos('${p.codigo}')">-</button>
${q}
<button class="btn-plus" onclick="mais('${p.codigo}')">+</button>
</div>
</div>`;
});

let itens=Object.values(qtd).filter(v=>v>0).length;
resumo.innerText=`Itens: ${itens} | Volumes: ${totalVol}`;
}

function mais(c){qtd[c]=(qtd[c]||0)+1;render();}
function menos(c){if(qtd[c])qtd[c]--;render();}
function limpar(){qtd={};render();}

function montar(){
let msg="Pedido RR\n";
produtos.forEach(p=>{
if(qtd[p.codigo]>0){
msg+=`${p.codigo} - ${p.descricao} = ${qtd[p.codigo]} ${p.embalagem}\n`;
}
});
return msg;
}

function enviar(){
if(!loja.value){alert("Selecione loja");return;}
window.open("https://wa.me/?text="+encodeURIComponent(montar()));
}

btnTodos.onclick=()=>{modo="todos";btnTodos.classList.add("ativo");btnSel.classList.remove("ativo");render();}
btnSel.onclick=()=>{modo="sel";btnSel.classList.add("ativo");btnTodos.classList.remove("ativo");render();}
busca.oninput=render;

init();

</script>

</body>
</html>
