<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App RR Lanches</title>

<style>
body { font-family: Arial; margin: 10px; background: #f5f7fa; padding-bottom:120px; }
h1 { color: #1e3a8a; font-size: 22px; }

select, input, textarea {
    padding: 12px;
    font-size: 16px;
    width: 100%;
    margin-bottom: 12px;
}

.item { margin: 6px 0; padding: 8px; border-radius: 6px; }
.linha-par { background: #f1f3f5; }

.item-top { display: flex; justify-content: space-between; align-items: center; gap:10px; }

.desc { flex:1; font-size:14px; }

.controls { display:flex; align-items:center; gap:5px; flex-shrink:0; }

.controls button {
    width: 36px;
    height: 36px;
    border: none;
    color: white;
    font-size: 18px;
}

.btn-minus { background: red; }
.btn-plus { background: blue; }

.categoria {
    margin-top: 20px;
    font-weight: bold;
    color: #1e3a8a;
}

.botoes-fixos{
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    display: flex;
}

.btn-enviar, .btn-limpar {
    flex:1;
    padding: 15px;
    font-size:16px;
    border:none;
    color:white;
}

.btn-enviar{ background: green; }
.btn-limpar{ background:#555; }

.logo {
    position: fixed;
    bottom: 70px;
    right: 10px;
    width: 70px;
    opacity: 0.15;
}
</style>
</head>

<body>

<h1>Pedido RR Lanches</h1>

<select id="loja"></select>
<input type="text" id="busca" placeholder="Buscar produto...">
<textarea id="extra" placeholder="Itens não encontrados"></textarea>

<div id="produtos"></div>

<div class="botoes-fixos">
    <button class="btn-limpar" onclick="limpar()">Limpar</button>
    <button class="btn-enviar" onclick="confirmar()">Enviar</button>
</div>

<img src="logo.png" class="logo">

<script>

let produtos = [];
let lojas = [];
let quantidades = JSON.parse(localStorage.getItem("qtd")) || {};

async function carregar(){
    produtos = await fetch("produtos.json").then(r=>r.json());
    lojas = await fetch("lojas.json").then(r=>r.json());

    let s = document.getElementById("loja");
    s.innerHTML = "<option value=''>Selecione a loja</option>";

    lojas.forEach(l=>{
        s.innerHTML += `<option>${l.codigo} - ${l.nome}</option>`;
    });

    render();
}

function render(){
    let busca = document.getElementById("busca").value.toLowerCase();
    let div = document.getElementById("produtos");
    div.innerHTML = "";

    let catAtual = "";
    let i = 0;

    produtos.forEach(p=>{
        if(!p.descricao.toLowerCase().includes(busca)) return;

        if(p.categoria !== catAtual){
            catAtual = p.categoria;
            div.innerHTML += `<div class="categoria">${p.categoria}</div>`;
        }

        let qtd = quantidades[p.codigo] || 0;
        let classe = i % 2 === 0 ? "item linha-par" : "item";

        div.innerHTML += `
        <div class="${classe}">
            <div class="item-top">
                <div class="desc">${p.codigo} - ${p.descricao}</div>
                <div class="controls">
                    <button class="btn-minus" onclick="menos('${p.codigo}')">-</button>
                    ${qtd}
                    <button class="btn-plus" onclick="mais('${p.codigo}')">+</button>
                </div>
            </div>
        </div>`;

        i++;
    });
}

function mais(c){ quantidades[c]=(quantidades[c]||0)+1; salvar(); }
function menos(c){ if(quantidades[c]>0){quantidades[c]--; salvar();}}

function salvar(){
    localStorage.setItem("qtd", JSON.stringify(quantidades));
    render();
}

function limpar(){
    if(confirm("Deseja limpar o pedido?")){
        quantidades = {};
        localStorage.removeItem("qtd");
        document.getElementById("extra").value = "";
        render();
    }
}

function gerarNumero(){
    const d = new Date();
    return "RR" +
    String(d.getDate()).padStart(2,'0') +
    String(d.getMonth()+1).padStart(2,'0') +
    String(d.getFullYear()).slice(2) + "-" +
    String(d.getHours()).padStart(2,'0') +
    String(d.getMinutes()).padStart(2,'0');
}

function montarMensagem(){
    const loja = document.getElementById("loja").value;
    const extra = document.getElementById("extra").value.trim();

    const d = new Date();
    const dias = ["Domingo","Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];

    let totalItens = 0;
    let msg = "";

    msg += `*Pedido* Nº: ${gerarNumero()}\n`;
    msg += `*Data* ${d.toLocaleDateString()} (${dias[d.getDay()]})\n`;
    msg += `Hora: ${d.toTimeString().slice(0,5)}\n\n`;

    msg += `Loja: ${loja}\n\n`;
    msg += `*Itens*\n`;

    produtos.forEach(p=>{
        if(quantidades[p.codigo] > 0){
            totalItens++;
            msg += `${p.codigo} - ${p.descricao} = ${quantidades[p.codigo]} ${p.embalagem}\n`;
        }
    });

    if(extra){
        msg += `\n*ITENS NÃO ENCONTRADOS:*\n${extra}\n`;
    }

    msg += `\n---------------\n`;
    msg += `*TOTAL DE ITENS:* ${totalItens}\n\n`;
    msg += `Pedido gerado via App RR Lanches`;

    return msg;
}

function confirmar(){
    const loja = document.getElementById("loja").value;
    if(!loja){
        alert("Selecione a loja");
        return;
    }

    const msg = montarMensagem();

    if(confirm(msg + "\n\nEnviar pedido?")){
        window.open("https://wa.me/5515997094000?text=" + encodeURIComponent(msg));
    }
}

document.getElementById("busca").addEventListener("input", render);

carregar();

</script>

</body>
</html>
