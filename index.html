<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RR Lanches - FINAL OK</title>

<style>
body{font-family:Arial;margin:0;background:#f3f4f6;padding-bottom:120px;}

.topo{padding:10px;background:#fff;position:sticky;top:0;}
select,input,textarea{width:100%;padding:10px;margin-bottom:8px;border-radius:6px;border:1px solid #ccc;}

.resumo{background:#111827;color:#fff;padding:8px;border-radius:6px;text-align:center;margin-bottom:8px;}

.filtro{display:flex;gap:8px;margin-bottom:10px;}
.filtro button{flex:1;padding:10px;border:none;border-radius:6px;background:#ddd;}
.filtro .ativo{background:#1e3a8a;color:#fff;}

.item{background:#fff;margin:6px;padding:10px;border-radius:8px;display:flex;justify-content:space-between;}
.item.ativo{background:#d1fae5;}

.controls button{width:35px;height:35px;border:none;color:#fff;border-radius:6px;}
.btn-plus{background:#2563eb;}
.btn-minus{background:#dc2626;}

.botoes{position:fixed;bottom:0;width:100%;display:flex;}
.botoes button{flex:1;padding:15px;border:none;color:#fff;}
.enviar{background:#16a34a;}
.limpar{background:#374151;}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;}
.modal-box{background:#fff;width:90%;max-height:90%;overflow:auto;padding:15px;border-radius:10px;}

.linha-par{background:#f3f4f6;padding:6px;}
.linha-impar{background:#fff;padding:6px;}

</style>
</head>

<body>

<div class="topo">
<select id="loja"></select>
<input id="busca" placeholder="Buscar">
<textarea id="extra" placeholder="Observações ou faltas"></textarea>

<div class="resumo" id="resumo">Itens: 0</div>

<div class="filtro">
<button id="todos" class="ativo">Todos</button>
<button id="sel">Selecionados</button>
</div>
</div>

<div id="lista"></div>

<div class="botoes">
<button class="limpar" onclick="limpar()">Limpar</button>
<button class="enviar" onclick="abrir()">Enviar</button>
</div>

<div class="modal" id="modal">
<div class="modal-box" id="box"></div>
</div>

<script>

let produtos=[],lojas=[],qtd={},modo="todos";

async function init(){
produtos=await fetch("produtos.json").then(r=>r.json());
lojas=await fetch("lojas.json").then(r=>r.json());

loja.innerHTML="<option>Selecione</option>";
lojas.forEach(l=>loja.innerHTML+=`<option>${l.codigo} - ${l.nome}</option>`);

render();
}

function render(){
let b=busca.value.toLowerCase();
lista.innerHTML="";
let total=0;

produtos.forEach(p=>{
let q=qtd[p.codigo]||0;

if(!p.descricao.toLowerCase().includes(b)&&!p.codigo.includes(b))return;
if(modo=="sel"&&q==0)return;

if(q>0)total+=q;

lista.innerHTML+=`
<div class="item ${q>0?'ativo':''}">
<span>${p.codigo} - ${p.descricao}</span>
<div class="controls">
<button class="btn-minus" onclick="menos('${p.codigo}')">-</button>
${q}
<button class="btn-plus" onclick="mais('${p.codigo}')">+</button>
</div>
</div>`;
});

resumo.innerText="Itens: "+Object.keys(qtd).filter(k=>qtd[k]>0).length+" | Volumes: "+total;
}

function mais(c){qtd[c]=(qtd[c]||0)+1;render();}
function menos(c){if(qtd[c])qtd[c]--;render();}
function limpar(){qtd={};render();}

function abrir(){
if(loja.value=="Selecione"){alert("Selecione loja");return;}

let html="<h3>Conferência</h3>";
let i=0;

produtos.forEach(p=>{
if(qtd[p.codigo]>0){
html+=`<div class="${i%2?'linha-impar':'linha-par'}">${p.codigo} - ${p.descricao} = ${qtd[p.codigo]}</div>`;
i++;
}
});

html+=`<br>Total: ${i}<br><br>
<button onclick="fechar()">Voltar</button>
<button onclick="enviar()">Confirmar</button>`;

box.innerHTML=html;
modal.style.display="flex";
}

function fechar(){modal.style.display="none";}

function enviar(){
let msg="Pedido\n";
produtos.forEach(p=>{
if(qtd[p.codigo]>0)msg+=`${p.codigo} - ${p.descricao} = ${qtd[p.codigo]}\n`;
});
window.open("https://wa.me/?text="+encodeURIComponent(msg));
fechar();
}

todos.onclick=()=>{modo="todos";todos.classList.add("ativo");sel.classList.remove("ativo");render();}
sel.onclick=()=>{modo="sel";sel.classList.add("ativo");todos.classList.remove("ativo");render();}
busca.oninput=render;

init();

</script>

</body>
</html>
